name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Astro checks
        run: npm run check

      - name: Run smoke test
        run: npm run smoke
