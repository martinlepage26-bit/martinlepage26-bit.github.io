<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" role="img" aria-labelledby="title desc">
  <title id="title">ML monogram</title>
  <desc id="desc">A split monogram with a dark M and a violet L.</desc>
  <defs>
    <linearGradient id="violetFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f046e" />
      <stop offset="58%" stop-color="#6310af" />
      <stop offset="100%" stop-color="#7b1ddd" />
    </linearGradient>
    <filter id="mShadow" x="-30%" y="-40%" width="170%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f1420" flood-opacity="0.16" />
    </filter>
    <filter id="lGlow" x="-60%" y="-70%" width="240%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#7b1ddd" flood-opacity="0.4" />
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#7b1ddd" flood-opacity="0.18" />
    </filter>
  </defs>

  <text
    x="20"
    y="122"
    fill="#06070b"
    filter="url(#mShadow)"
    font-family="'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif"
    font-size="132"
    font-style="italic"
    font-weight="700"
    letter-spacing="-6"
  >
    M
  </text>

  <text
    x="134"
    y="122"
    fill="url(#violetFill)"
    filter="url(#lGlow)"
    font-family="'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif"
    font-size="136"
    font-style="italic"
    font-weight="700"
    letter-spacing="-5"
  >
    L
  </text>
</svg>
