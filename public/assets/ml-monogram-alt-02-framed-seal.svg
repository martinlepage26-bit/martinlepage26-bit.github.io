  </g>

  <path d="M132 35V125" stroke="rgba(164, 180, 177, 0.38)" stroke-width="1.4" stroke-linecap="round" />
  <path d="M148 35V125" stroke="rgba(176, 150, 154, 0.34)" stroke-width="1.4" stroke-linecap="round" />
