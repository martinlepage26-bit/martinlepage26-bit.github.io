<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" role="img" aria-labelledby="title desc">
  <title id="title">ML monogram alt 02 teal rose</title>
  <desc id="desc">Balanced framed ML monogram rendered in muted teal and muted scarlet rose.</desc>
  <defs>
    <linearGradient id="frameStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7d5d2" />
      <stop offset="100%" stop-color="#9aa9a7" />
    </linearGradient>
    <linearGradient id="mStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9dbdb8" />
      <stop offset="100%" stop-color="#5f8480" />
    </linearGradient>
    <linearGradient id="lStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c59296" />
      <stop offset="100%" stop-color="#8d626a" />
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-40%" width="180%" height="220%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#0b1319" flood-opacity="0.28" />
    </filter>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#softShadow)">
